name: Deploy Webroot → Live (wpx.net)

on:
  push:
    branches: [ main ]
    paths:
      - 'webroot/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # Deploys files in webroot/ to WordPress root (verification files, etc.)
      # Theme and plugin are deployed from their own repos.
      - name: Deploy webroot files via SFTP
        env:
          SFTP_HOST: ${{ secrets.WPX_SFTP_HOST }}
          SFTP_USER: ${{ secrets.WPX_SFTP_USER }}
          SFTP_PASS: ${{ secrets.WPX_SFTP_PASS }}
        run: |
          echo 'set net:timeout 30'                                                                   >  /tmp/lftp-deploy.txt
          echo 'set net:max-retries 3'                                                                >> /tmp/lftp-deploy.txt
          echo 'set sftp:auto-confirm yes'                                                            >> /tmp/lftp-deploy.txt
          echo 'set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa"' >> /tmp/lftp-deploy.txt
          echo "open -u \"${SFTP_USER}\",\"${SFTP_PASS}\" sftp://${SFTP_HOST}:2222"                  >> /tmp/lftp-deploy.txt
          echo 'mirror --reverse --verbose . public_html'                                             >> /tmp/lftp-deploy.txt
          echo 'bye'                                                                                  >> /tmp/lftp-deploy.txt
          lftp -f /tmp/lftp-deploy.txt
