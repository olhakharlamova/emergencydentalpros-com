name: Deploy Webroot → Live (wpx.net)

on:
  push:
    branches: [ main ]
    paths:
      - 'webroot/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # Deploys files that live in the WordPress root (verification files, etc.)
      # Theme and plugin are deployed from their own repos.
      - name: Deploy webroot files via SFTP
        env:
          SFTP_HOST: ${{ secrets.WPX_SFTP_HOST }}
          SFTP_USER: ${{ secrets.WPX_SFTP_USER }}
          SFTP_PASS: ${{ secrets.WPX_SFTP_PASS }}
        run: |
          mkdir -p ~/.lftp
          echo "set sftp:auto-confirm yes" > ~/.lftp/rc
          lftp -u "$SFTP_USER","$SFTP_PASS" -p 2222 "sftp://$SFTP_HOST" << 'EOF'
          mirror --reverse --verbose \
            . public_html
          bye
          EOF
