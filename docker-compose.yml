services:
  db:
    image: mariadb:10.5
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./db-import:/docker-entrypoint-initdb.d

  wordpress:
    image: wordpress:php8.1-apache
    restart: unless-stopped
    depends_on: [db]
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASS}
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DEBUG: 0
      WORDPRESS_DEBUG_DISPLAY: 0
      WORDPRESS__CONFIG_EXTRA: "@ini_set('display_errors', 0);"
    volumes:
      - wp_core:/var/www/html
      - ./emergencydentalpros-theme:/var/www/html/wp-content/themes/edp-v2
      - ./emergencydentalpros:/var/www/html/wp-content/plugins/emergencydentalpros
      - ./uploads:/var/www/html/wp-content/uploads

  wpcli:
    image: wordpress:cli
    depends_on: [db, wordpress]
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASS}
      WORDPRESS_DB_NAME: ${DB_NAME}
    volumes:
      - wp_core:/var/www/html
      - ./emergencydentalpros-theme:/var/www/html/wp-content/themes/edp-v2
      - ./emergencydentalpros:/var/www/html/wp-content/plugins/emergencydentalpros
      - ./uploads:/var/www/html/wp-content/uploads
    profiles: [tools]

  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped
    depends_on: [db]
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db

volumes:
  db_data:
  wp_core:
